name: Build Windows Executable

on:
  push:branches: [ "main", "master" ] # Se ejecuta al subir a estas ramas
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest # Usamos un servidor con Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # Usamos la misma que descargaste
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: git update-index --chmod=+x gradlew

      - name: Build with Gradle
        run: ./gradlew :composeApp:packageExe # El comando que ya conoces

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: MiniErp-Windows-Exe
          path: composeApp/build/compose/binaries/main/exe/*.exe